[theme]
base            = "dark"
primaryColor    = "#6e40c9"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor       = "#e6edf3"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
maxUploadSize   = 50

[browser]
gatherUsageStats = false
